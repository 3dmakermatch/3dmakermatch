services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3dmakermatch-app
    restart: unless-stopped
    mem_limit: 1g
    environment:
      - NODE_ENV=production
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - PORT=3000
      - DATABASE_URL=postgresql://printbid:printbid@db:5432/printbid?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-3dmakermatch-jwt-secret-change-in-prod}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-3dmakermatch-refresh-secret-change-in-prod}
      - CLIENT_URL=https://app.3dmakermatch.dev.christofferson.family
      - UPLOAD_DIR=/app/uploads
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@3dmakermatch.dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SERVER_URL=${SERVER_URL:-https://app.3dmakermatch.dev.christofferson.family}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.3dmakermatch.rule=Host(`app.3dmakermatch.dev.christofferson.family`)"
      - "traefik.http.routers.3dmakermatch.entrypoints=web"
      - "traefik.http.services.3dmakermatch.loadbalancer.server.port=3000"
    networks:
      - proxy-net
      - internal

  db:
    image: postgis/postgis:16-3.4
    container_name: 3dmakermatch-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: printbid
      POSTGRES_PASSWORD: printbid
      POSTGRES_DB: printbid
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printbid"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: 3dmakermatch-redis
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:
  uploads:

networks:
  proxy-net:
    external: true
  internal:
    driver: bridge
